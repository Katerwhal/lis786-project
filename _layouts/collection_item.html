---
layout: base
---
<article class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>

    {{ page.tags }}
<br><br>
  <div class="post-content">
    {{ content }}
  </div>

    <a href={{ page.backlink | relative_url }}>Back to {{page.category}}</a>

  </article>
